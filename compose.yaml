services:
    astro:
        build:
            context: . # repo root: Containerfile COPYs use app/ prefixes
            dockerfile: Containerfile
        init: true
        command: ["sleep", "infinity"]
        ports:
            - target: 4321
              published: "4321"
        volumes:
            - ./:/website:z # the whole repo, .git included
            - /website/app/node_modules # mask moves with the app path
        environment:
            GH_TOKEN: ${GH_TOKEN}
            GIT_AUTHOR_NAME: ${GIT_NAME}
            GIT_AUTHOR_EMAIL: ${GIT_EMAIL}
            GIT_COMMITTER_NAME: ${GIT_NAME}
            GIT_COMMITTER_EMAIL: ${GIT_EMAIL}
